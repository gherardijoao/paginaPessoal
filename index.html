<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Pessoal - João Gherardi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        h1 {
            color: #333;
        }
        .options {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn-bootstrap {
            background-color: #7952b3;
        }
        .btn-tailwind {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>
    <h1>Bem-vindo ao meu Portfólio</h1>
    <p>João Gherardi - Desenvolvimento Web</p>
    <div class="options">
        <a href="bootstrap/index.html" class="btn btn-bootstrap">Versão Bootstrap</a>
        <a href="tailwind/index.html" class="btn btn-tailwind">Versão Tailwind</a>
    </div>
</body>
</html>
